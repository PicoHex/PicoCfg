name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  pack:
    name: Pack NuGet packages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Pack packages
        shell: bash
        run: |
          rm -rf ./artifacts/nupkg
          mkdir -p ./artifacts/nupkg

          dotnet pack src/PicoCfg.Abs/PicoCfg.Abs.csproj \
            --configuration Release \
            --output ./artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:ContinuousIntegrationBuild=true \
            -p:Deterministic=true

          dotnet pack src/PicoCfg/PicoCfg.csproj \
            --configuration Release \
            --output ./artifacts/nupkg \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -p:UseProjectReferences=false \
            -p:ContinuousIntegrationBuild=true \
            -p:Deterministic=true \
            -p:RestoreAdditionalProjectSources=./artifacts/nupkg

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pack
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish packages
        shell: bash
        run: |
          cd ./artifacts/nupkg
          for file in *.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.event.repository.name }} ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/nupkg/*.nupkg
            artifacts/nupkg/*.snupkg
