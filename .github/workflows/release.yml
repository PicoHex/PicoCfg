name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  pack:
    name: Pack NuGet packages
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME}"
          version="${ref_name#v}"

          if [ -z "$version" ] || [ "$version" = "$ref_name" ]; then
            echo "Release workflow expects a v* tag." >&2
            exit 1
          fi

          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

      - name: Pack packages in dependency order
        shell: bash
        run: |
          rm -rf ./artifacts/nupkg
          mkdir -p ./artifacts/nupkg

          VERSION="${{ steps.version.outputs.VERSION }}"
          NUPKG_DIR="$GITHUB_WORKSPACE/artifacts/nupkg"
          NUGET_SOURCE="https://api.nuget.org/v3/index.json"

          dotnet pack src/PicoCfg.Abs/PicoCfg.Abs.csproj \
            --configuration Release \
            --output ./artifacts/nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:PicoCfgPackageVersion="$VERSION" \
            -p:RestoreSources="$NUGET_SOURCE"

          dotnet pack src/PicoCfg.Gen/PicoCfg.Gen.csproj \
            --configuration Release \
            --output ./artifacts/nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:PicoCfgPackageVersion="$VERSION" \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

          dotnet pack src/PicoCfg/PicoCfg.csproj \
            --configuration Release \
            --output ./artifacts/nupkg \
            -p:Version="$VERSION" \
            -p:UseProjectReferences=false \
            -p:PicoCfgPackageVersion="$VERSION" \
            -p:RestoreSources="$NUGET_SOURCE" \
            -p:RestoreAdditionalProjectSources="$NUPKG_DIR"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            ./artifacts/nupkg/*.nupkg
            ./artifacts/nupkg/*.snupkg

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: pack
    environment: release
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish packages to NuGet
        shell: bash
        run: |
          shopt -s nullglob
          for file in *.nupkg; do
            if [[ "$file" != *.snupkg ]] && [[ "$file" != *.symbols.nupkg ]]; then
              dotnet nuget push "$file" \
                --api-key "${{ secrets.NUGET_API_KEY }}" \
                --source https://api.nuget.org/v3/index.json \
                --skip-duplicate
            fi
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PicoCfg ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            *.nupkg
            *.snupkg
