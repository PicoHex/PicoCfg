name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for SourceLink
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore tests/PicoCfg.Tests/PicoCfg.Tests.csproj -p:UseProjectReferences=true
    
    - name: Build
      run: dotnet build tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-restore -p:UseProjectReferences=true
    
    - name: Run tests
      run: dotnet test --project tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true

  pack:
    name: Pack
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Pack NuGet packages
      run: |
        # Clean output directory
        rm -rf ./nupkg
        mkdir -p ./nupkg
        
        # Pack abstractions first
        dotnet pack src/PicoCfg.Abs/PicoCfg.Abs.csproj \
          --configuration Release \
          --output ./nupkg \
          -p:Version=${{ steps.version.outputs.VERSION }} \
          -p:UseProjectReferences=false \
          -p:ContinuousIntegrationBuild=true \
          -p:Deterministic=true
        
        # Pack main project, using packed abstractions as additional source
        dotnet pack src/PicoCfg/PicoCfg.csproj \
          --configuration Release \
          --output ./nupkg \
          -p:Version=${{ steps.version.outputs.VERSION }} \
          -p:UseProjectReferences=false \
          -p:ContinuousIntegrationBuild=true \
          -p:Deterministic=true \
          -p:RestoreAdditionalProjectSources=./nupkg
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nupkg
        path: ./nupkg

  aot-validation:
    name: AOT Validation (${{ matrix.runtime }})
    runs-on: ${{ matrix.os }}
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          # x64 architectures
          - runtime: win-x64
            os: windows-latest
          - runtime: linux-x64  
            os: ubuntu-latest
          # ARM architectures (optional for basic libraries)
          - runtime: win-arm64
            os: windows-latest
          - runtime: linux-arm64
            os: ubuntu-latest
          - runtime: osx-arm64
            os: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Install platform-specific SDK
      if: matrix.os == 'windows-latest'
      uses: seanmiddleditch/gha-setup-vsdevenv@master
    
    - name: Install Clang (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
    
    - name: Install Xcode command line tools (macOS)
      if: matrix.os == 'macos-latest'
      run: xcode-select --install || true
    
    - name: Restore dependencies for AOT
      run: dotnet restore samples/PicoCfg.Sample -r ${{ matrix.runtime }}
    
    - name: Build AOT sample
      run: |
        dotnet publish samples/PicoCfg.Sample \
          -c Release \
          -r ${{ matrix.runtime }} \
          -p:PublishAOT=true \
          --self-contained \
          -o ./artifacts/aot-${{ matrix.runtime }}
    
    - name: Upload AOT artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aot-binaries-${{ matrix.runtime }}
        path: ./artifacts/aot-${{ matrix.runtime }}

  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [pack, aot-validation]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      contents: write
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: nupkg
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Publish to NuGet.org
      run: |
        cd nupkg
        for file in *.nupkg
        do
          if [[ $file != *.symbols.* ]] && [[ $file != *.snupkg ]]; then
            echo "Publishing $file"
            dotnet nuget push $file \
              --api-key ${{ secrets.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          fi
        done
    
    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.event.repository.name }} ${{ steps.version.outputs.VERSION }}
        draft: false
        generate_release_notes: true
        files: |
          nupkg/*.nupkg
          nupkg/*.snupkg