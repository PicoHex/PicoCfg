name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  validate:
    name: Validate (${{ matrix.logical-target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            runs-on: windows-latest
            rid: win-x64
          - logical-target: win-arm64
            runs-on: windows-11-arm
            rid: win-arm64
          - logical-target: linux-x64
            runs-on: ubuntu-latest
            rid: linux-x64
          - logical-target: linux-arm64
            runs-on: ubuntu-24.04-arm
            rid: linux-arm64
          - logical-target: osx-arm64
            runs-on: macos-latest
            rid: osx-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show logical target
        run: echo Testing ${{ matrix.logical-target }} with RID ${{ matrix.rid }}

      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

          if [[ "${{ matrix.rid }}" == "linux-arm64" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          fi

      - name: Restore dependencies
        run: dotnet restore -p:UseProjectReferences=true

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:UseProjectReferences=true

      - name: Run tests
        run: dotnet test --project tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-build --verbosity normal --timeout 120s --no-progress --no-ansi -p:UseProjectReferences=true

      - name: Run PicoCfg.Gen tests
        run: dotnet test --project tests/PicoCfg.Gen.Tests/PicoCfg.Gen.Tests.csproj --configuration Release --no-build --verbosity normal --timeout 120s --no-progress --no-ansi -p:UseProjectReferences=true

      - name: Run PicoCfg.DI tests
        run: dotnet test --project tests/PicoCfg.DI.Tests/PicoCfg.DI.Tests.csproj --configuration Release --no-build --verbosity normal --timeout 120s --no-progress --no-ansi -p:UseProjectReferences=true

      - name: Pack CI packages for package-consumer validation
        shell: bash
        run: |
          rm -rf ./artifacts/ci-nupkg
          rm -rf ./artifacts/ci-packages
          mkdir -p ./artifacts/ci-nupkg
          mkdir -p ./artifacts/ci-packages/abs ./artifacts/ci-packages/pico ./artifacts/ci-packages/gen ./artifacts/ci-packages/di ./artifacts/ci-packages/consumer

          dotnet pack src/PicoCfg.Abs/PicoCfg.Abs.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:UseProjectReferences=false \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/abs"

          dotnet pack src/PicoCfg/PicoCfg.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$GITHUB_WORKSPACE/artifacts/ci-nupkg" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/pico"

          dotnet pack src/PicoCfg.Gen/PicoCfg.Gen.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$GITHUB_WORKSPACE/artifacts/ci-nupkg" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/gen"

          dotnet pack src/PicoCfg.DI/PicoCfg.DI.csproj \
            --configuration Release \
            --output ./artifacts/ci-nupkg \
            -p:UseProjectReferences=false \
            -p:RestoreAdditionalProjectSources="$GITHUB_WORKSPACE/artifacts/ci-nupkg" \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/di"

      - name: Validate PicoCfg.Gen package sample path
        if: matrix.logical-target == 'linux-x64'
        shell: bash
        run: |
          rm -rf samples/PicoCfg.Gen.Sample/bin samples/PicoCfg.Gen.Sample/obj
          rm -rf ./artifacts/ci-packages/gen-sample
          mkdir -p ./artifacts/ci-packages/gen-sample

          dotnet restore samples/PicoCfg.Gen.Sample/PicoCfg.Gen.Sample.csproj \
            --source https://api.nuget.org/v3/index.json \
            --source "$GITHUB_WORKSPACE/artifacts/ci-nupkg" \
            -p:UseProjectReferences=false \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/gen-sample"

          grep -q '"PicoCfg.Gen/0.0.0-dev"' samples/PicoCfg.Gen.Sample/obj/project.assets.json
          grep -q '"PicoCfg.Gen >= 0.0.0-dev"' samples/PicoCfg.Gen.Sample/obj/project.assets.json
          grep -q '"projectReferences": {}' samples/PicoCfg.Gen.Sample/obj/project.assets.json

          dotnet build samples/PicoCfg.Gen.Sample/PicoCfg.Gen.Sample.csproj \
            --configuration Release \
            --no-restore \
            -p:UseProjectReferences=false

          dotnet run --project samples/PicoCfg.Gen.Sample/PicoCfg.Gen.Sample.csproj \
            --configuration Release \
            --no-build \
            -p:UseProjectReferences=false

      - name: Validate PicoCfg.DI package sample path
        if: matrix.logical-target == 'linux-x64'
        shell: bash
        run: |
          rm -rf samples/PicoCfg.DI.Sample/bin samples/PicoCfg.DI.Sample/obj
          rm -rf ./artifacts/ci-packages/di-sample
          mkdir -p ./artifacts/ci-packages/di-sample

          dotnet restore samples/PicoCfg.DI.Sample/PicoCfg.DI.Sample.csproj \
            --source https://api.nuget.org/v3/index.json \
            --source "$GITHUB_WORKSPACE/artifacts/ci-nupkg" \
            -p:UseProjectReferences=false \
            -p:RestorePackagesPath="$GITHUB_WORKSPACE/artifacts/ci-packages/di-sample"

          grep -q '"PicoCfg.DI/0.0.0-dev"' samples/PicoCfg.DI.Sample/obj/project.assets.json
          grep -q '"PicoCfg.Gen/0.0.0-dev"' samples/PicoCfg.DI.Sample/obj/project.assets.json
          grep -q '"PicoCfg.DI >= 0.0.0-dev"' samples/PicoCfg.DI.Sample/obj/project.assets.json
          grep -q '"PicoCfg.Gen >= 0.0.0-dev"' samples/PicoCfg.DI.Sample/obj/project.assets.json
          grep -q '"projectReferences": {}' samples/PicoCfg.DI.Sample/obj/project.assets.json

          dotnet build samples/PicoCfg.DI.Sample/PicoCfg.DI.Sample.csproj \
            --configuration Release \
            --no-restore \
            -p:UseProjectReferences=false

          dotnet run --project samples/PicoCfg.DI.Sample/PicoCfg.DI.Sample.csproj \
            --configuration Release \
            --no-build \
            -p:UseProjectReferences=false

      - name: Validate AOT publish path
        run: dotnet publish samples/PicoCfg.Sample/PicoCfg.Sample.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained -p:UseProjectReferences=true

      - name: Validate PicoCfg.Gen sample path
        if: matrix.logical-target == 'linux-x64'
        run: dotnet run --project samples/PicoCfg.Gen.Sample/PicoCfg.Gen.Sample.csproj --configuration Release -p:UseProjectReferences=true

      - name: Validate PicoCfg.DI sample path
        if: matrix.logical-target == 'linux-x64'
        run: dotnet run --project samples/PicoCfg.DI.Sample/PicoCfg.DI.Sample.csproj --configuration Release -p:UseProjectReferences=true
