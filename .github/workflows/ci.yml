name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.x
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  validate:
    name: Validate (${{ matrix.logical-target }})
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - logical-target: win-x64
            rid: win-x64
            runs-on: windows-latest
          - logical-target: win-arm64
            rid: win-arm64
            runs-on: windows-2025-arm64
          - logical-target: linux-x64
            rid: linux-x64
            runs-on: ubuntu-latest
          - logical-target: linux-arm64
            rid: linux-arm64
            runs-on: ubuntu-24.04-arm64
          - logical-target: osx-arm64
            rid: osx-arm64
            runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show logical target
        shell: bash
        run: echo "Validating ${{ matrix.logical-target }} on ${{ matrix.runs-on }}"

      - name: Restore
        run: dotnet restore tests/PicoCfg.Tests/PicoCfg.Tests.csproj -p:UseProjectReferences=true

      - name: Build
        run: dotnet build tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-restore -p:UseProjectReferences=true

      - name: Test
        run: dotnet test --project tests/PicoCfg.Tests/PicoCfg.Tests.csproj --configuration Release --no-build --verbosity normal -p:UseProjectReferences=true

      - name: Install Linux AOT prerequisites
        if: startsWith(matrix.rid, 'linux-')
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Install Windows AOT prerequisites
        if: startsWith(matrix.rid, 'win-')
        uses: seanmiddleditch/gha-setup-vsdevenv@master

      - name: Install macOS command line tools
        if: startsWith(matrix.rid, 'osx-')
        run: xcode-select --install || true

      - name: Publish AOT sample
        run: dotnet publish samples/PicoCfg.Sample/PicoCfg.Sample.csproj --configuration Release -r ${{ matrix.rid }} --self-contained -o ./artifacts/aot-${{ matrix.logical-target }}
